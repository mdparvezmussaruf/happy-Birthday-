<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Happy Birthday Rova</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
font-family:Poppins;
background:linear-gradient(135deg,#1e1f4b,#4a1c40,#7b1fa2);
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
text-align:center;
}

/* soft glow background */

.bg-glow{
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle,#ff4fd8,#ff9a9e,transparent);
filter:blur(180px);
opacity:0.45;
}

/* Title */

.title{
font-size:70px;
font-family:Pacifico;
color:#fff;
text-shadow:
0 0 10px rgba(255,255,255,0.8),
0 0 20px rgba(255,200,255,0.7),
0 0 30px rgba(255,100,200,0.6);
z-index:10;
}

/* Balloon */

.balloon{
position:absolute;
bottom:-100px;
width:40px;
height:50px;
border-radius:50%;
animation:rise linear infinite;
}

.balloon:after{
content:"";
position:absolute;
width:2px;
height:40px;
background:white;
top:50px;
left:50%;
}

@keyframes rise{

0%{
transform:translateY(0);
}

100%{
transform:translateY(-120vh);
}

}

/* Flower */

.flower{
position:absolute;
top:-60px;
pointer-events:none;
animation:fall linear infinite;
}

@keyframes fall{

0%{
transform:translateY(0) rotate(0deg);
}

50%{
transform:translateY(50vh) translateX(20px) rotate(180deg);
}

100%{
transform:translateY(110vh) translateX(-20px) rotate(360deg);
}

}

/* Quote box */

.quote-box{

position:absolute;
bottom:40px;

background:rgba(0,0,0,0.55);
border:1px solid rgba(255,255,255,0.25);

padding:20px 40px;

border-radius:14px;

font-size:20px;

max-width:550px;

color:white;

box-shadow:0 15px 40px rgba(0,0,0,0.6);

}

.fade{
animation:fade 1s;
}

@keyframes fade{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<div class="bg-glow"></div>

<div class="title">Happy Birthday Rova 🎉</div>

<div class="quote-box" id="quote"></div>

<script>

/* Quotes */

const quotes=[

"Wishing you a day filled with happiness and a year filled with joy.",

"Happy Birthday! May all your dreams come true.",

"May your birthday be the start of a year full of good luck and happiness.",

"Every birthday is a new beginning. Enjoy your special day!",

"May your life be filled with laughter, love, and endless happiness.",

"Today is your special day. Celebrate it with joy!"

];

let q=0;

function changeQuote(){

const box=document.getElementById("quote");

box.classList.remove("fade");

setTimeout(()=>{

box.innerText=quotes[q];

box.classList.add("fade");

q=(q+1)%quotes.length;

},200);

}

setInterval(changeQuote,4000);

changeQuote();


/* Balloons */

function createBalloon(){

const balloon=document.createElement("div");

balloon.className="balloon";

balloon.style.left=Math.random()*100+"vw";

balloon.style.background=`hsl(${Math.random()*360},90%,55%)`;

balloon.style.animationDuration=8+Math.random()*6+"s";

document.body.appendChild(balloon);

setTimeout(()=>{

balloon.remove()

},15000);

}

setInterval(createBalloon,500);


/* Flower images */

const flowerImages=[

"flowers/flower1.png",
"flowers/flower2.png",
"flowers/flower3.png",
"flowers/flower4.png"

];


/* Flower generator */

function createFlower(){

const flower=document.createElement("img");

flower.className="flower";

flower.src=flowerImages[Math.floor(Math.random()*flowerImages.length)];

flower.style.left=Math.random()*100+"vw";

flower.style.width=(30+Math.random()*25)+"px";

flower.style.animationDuration=6+Math.random()*6+"s";

document.body.appendChild(flower);

setTimeout(()=>{

flower.remove()

},12000);

}

setInterval(createFlower,400);

</script>

</body>

</html>
