<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Happy Birthday Rova</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Pacifico&display=swap" rel="stylesheet">

<style>
  /* -------- base layout -------- */
  :root { --fg:#fff; --bg1:#1e1f4b; --bg2:#7b1fa2; }
  html,body{height:100%;margin:0;}
  body{
    margin:0;
    overflow:hidden;
    font-family:Poppins,system-ui,Segoe UI,Roboto;
    background:linear-gradient(135deg,var(--bg1),#4a1c40,var(--bg2));
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--fg);
    text-align:center;
  }

  /* glow behind content */
  .bg-glow{
    position:absolute;
    left:50%;
    top:35%;
    transform:translate(-50%,-35%);
    width:700px;
    height:700px;
    background:radial-gradient(circle,#ff4fd8,#ff9a9e,transparent);
    filter:blur(180px);
    opacity:0.45;
    z-index:0;
    pointer-events:none;
  }

  /* main content container (keeps everything above animations) */
  #content{
    position:relative;
    z-index:10;
    width:100%;
    max-width:1100px;
    padding:24px;
    box-sizing:border-box;
  }

  /* title / countdown / cake / message - always above decorations */
  .title,
  .countdown,
  .cake,
  .message,
  .quote-box{
    position:relative;
    z-index:10;
  }

  .title{
    font-size:64px;
    font-family:Pacifico, "Brush Script MT", cursive;
    color: #fff;
    margin:6px 0 4px;
    text-shadow:
      0 0 10px rgba(255,255,255,0.85),
      0 0 20px rgba(255,200,255,0.7),
      0 0 30px rgba(255,100,200,0.5);
  }

  .countdown{
    font-size:34px;
    margin-top:6px;
    font-weight:600;
    color:#fff;
  }

  /* quote box (clear and legible) */
  .quote-box{
    margin-top:22px;
    background:rgba(0,0,0,0.6);
    border:1px solid rgba(255,255,255,0.12);
    padding:18px 28px;
    border-radius:12px;
    font-size:18px;
    max-width:780px;
    margin-left:auto;
    margin-right:auto;
    color:#fff;
    box-shadow:0 12px 30px rgba(0,0,0,0.6);
  }

  /* cake */
  .cake{ margin-top:28px; display:block; }
  .layer{ width:220px; height:64px; border-radius:12px; margin:6px auto; }
  .layer{ background:#ff9ecb; }
  .layer.middle{ width:170px; background:#ff7eb3; }
  .layer.top{ width:120px; background:#ff4f9a; }
  .candle{ width:12px; height:40px; background:white; position:absolute; left:50%; transform:translateX(-50%); top:-50px; border-radius:4px; }
  .flame{ width:12px; height:16px; background:orange; border-radius:50%; position:absolute; top:-18px; left:0; animation:flicker 0.22s infinite alternate; }
  @keyframes flicker{ from{ transform:scale(1); } to{ transform:scale(1.18); } }

  .message{ margin-top:18px; font-size:20px; max-width:820px; margin-left:auto;margin-right:auto; min-height:54px; }

  /* -------- decorations (lower z-index) -------- */
  .balloon,
  .flower,
  .firework{
    position:absolute;
    z-index:2; /* still above background but below content (content has z-index:10) */
    pointer-events:none;
  }

  .balloon{ bottom:-120px; width:40px; height:50px; border-radius:50%; animation:rise linear infinite; opacity:0.95; }
  .balloon:after{ content:""; position:absolute; width:2px; height:42px; background:rgba(255,255,255,0.9); top:48px; left:50%; transform:translateX(-50%); }

  @keyframes rise{ 0%{ transform:translateY(0);} 100%{ transform:translateY(-130vh);} }

  .flower{ top:-80px; animation:fall linear infinite; will-change:transform,opacity; }
  @keyframes fall{
    0%{ transform:translateY(0) rotate(0deg); opacity:1; }
    50%{ transform:translateY(50vh) translateX(18px) rotate(180deg); opacity:0.95; }
    100%{ transform:translateY(115vh) translateX(-18px) rotate(360deg); opacity:0.9; }
  }

  .firework{ width:6px; height:6px; border-radius:50%; animation:explode 1s ease-out forwards; }
  @keyframes explode{ 0%{ transform:scale(1); opacity:1; } 100% { transform:scale(26); opacity:0; } }

  /* small clickable instruction if audio blocked */
  .play-music-hint{
    margin-top:14px;
    display:inline-block;
    padding:8px 12px;
    background:rgba(255,255,255,0.08);
    border-radius:8px;
    font-size:14px;
    cursor:pointer;
    border:1px solid rgba(255,255,255,0.06);
  }

  /* responsive */
  @media (max-width:520px){
    .title{ font-size:38px; }
    .countdown{ font-size:20px; }
    .layer{ width:160px; height:46px; }
    .layer.middle{ width:130px; }
    .layer.top{ width:100px; }
  }
</style>
</head>
<body>

  <div class="bg-glow"></div>

  <div id="content" aria-live="polite"></div>

  <!-- Put your audio file named birthday.mp3 next to this HTML (or update src) -->
  <audio id="music" src="birthday.mp3" loop preload="auto"></audio>

<script>
document.addEventListener('DOMContentLoaded', () => {

  /* ====== CONFIG ======
     B_MONTH: 0=Jan ... 3=Apr ... 11=Dec
     B_DAY  : day of month
     Change here to set the birthday.
     ===================== */
  const B_MONTH = 3;   // April (3)
  const B_DAY   = 27;  // 27th

  /* --- helper: next occurrence of birthday (this year or next) --- */
  function getNextBirthday(monthIndex, day){
    const now = new Date();
    let year = now.getFullYear();
    let target = new Date(year, monthIndex, day, 0, 0, 0, 0);
    // if today already past or equal at midnight earlier this same day, choose next year
    if (target <= now) {
      target = new Date(year + 1, monthIndex, day, 0, 0, 0, 0);
    }
    return target;
  }

  // For quick testing, you can uncomment the next lines to set a nearby test time:
  // const now = new Date();
  // const birthday = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours(), now.getMinutes()+1, 0);
  const birthday = getNextBirthday(B_MONTH, B_DAY);

  const content = document.getElementById('content');
  const music = document.getElementById('music');

  /* ---- state holders (so we can clear intervals if needed) ---- */
  let countdownInterval = null;
  let balloonInterval = null;
  let flowerInterval = null;
  let fireworkInterval = null;
  let quotesInterval = null;

  /* -------- show countdown UI -------- */
  function showCountdown(){
    content.innerHTML = `
      <div class="title">Rova's Birthday Countdown 🎂</div>
      <div class="countdown" id="timer" aria-live="polite"></div>
      <div style="margin-top:18px">
        <small style="opacity:0.85">Celebration will start automatically at midnight on the birthday.</small>
      </div>
    `;
    updateCountdown(); // set immediately
    countdownInterval = setInterval(updateCountdown, 1000);
  }

  /* -------- update countdown, switch when done -------- */
  function updateCountdown(){
    const now = new Date();
    const diff = +birthday - +now;

    if (diff <= 0){
      // countdown finished -> show celebration
      if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
      showCelebration();
      return;
    }

    const d = Math.floor(diff / (1000*60*60*24));
    const h = Math.floor((diff / (1000*60*60)) % 24);
    const m = Math.floor((diff / (1000*60)) % 60);
    const s = Math.floor((diff / 1000) % 60);

    const timer = document.getElementById('timer');
    if (timer) {
      timer.textContent = `${d}d ${h}h ${m}m ${s}s`;
    }
  }

  /* -------- show celebration UI -------- */
  function showCelebration(){
    // clear any leftover intervals
    if (countdownInterval){ clearInterval(countdownInterval); countdownInterval = null; }

    content.innerHTML = `
      <div class="title">Happy Birthday Rova 🎉</div>

      <div class="cake" aria-hidden="false">
        <div class="layer top"></div>
        <div class="layer middle"></div>
        <div class="layer"></div>
        <div class="candle"><div class="flame"></div></div>
      </div>

      <div class="message" id="message" aria-live="polite"></div>

      <div class="quote-box" id="quote" aria-live="polite"></div>

      <div style="margin-top:10px">
        <button id="enable-music" class="play-music-hint" style="display:none">Enable Music</button>
      </div>
    `;

    startEffects();
  }

  /* -------- start celebration effects -------- */
  function startEffects(){
    // typing message
    const messageText = "Wishing you endless happiness, love, and beautiful moments today and always. Happy Birthday Rova!";
    const messageEl = document.getElementById('message');
    let idx = 0;
    function typeWriter(){
      if (!messageEl) return;
      if (idx < messageText.length){
        messageEl.textContent += messageText.charAt(idx);
        idx++;
        setTimeout(typeWriter, 48);
      }
    }
    typeWriter();

    // quotes rotation
    const quotes = [
      "Wishing you a day filled with happiness.",
      "May all your dreams come true.",
      "May your life always shine bright.",
      "You deserve the best celebration ever."
    ];
    let q = 0;
    const quoteEl = document.getElementById('quote');
    if (quoteEl){
      quoteEl.textContent = quotes[0];
      quotesInterval = setInterval(()=>{
        q = (q+1) % quotes.length;
        quoteEl.textContent = quotes[q];
      }, 4000);
    }

    // try autoplay music; if blocked, show enable button to request user interaction
    function attemptPlayMusic(){
      music.play().catch(() => {
        // browser blocked autoplay -> show clickable hint
        const enableBtn = document.getElementById('enable-music');
        if (enableBtn){
          enableBtn.style.display = 'inline-block';
          enableBtn.addEventListener('click', () => {
            music.play().catch(()=>{}); // ignore repeated failures
            enableBtn.style.display = 'none';
          }, { once:true });
        }
      });
    }
    attemptPlayMusic();

    // balloons: limit & interval
    function createBalloon(){
      const maxBalloons = 20;
      if (document.querySelectorAll('.balloon').length >= maxBalloons) return;
      const b = document.createElement('div');
      b.className = 'balloon';
      b.style.left = (Math.random()*100) + 'vw';
      b.style.background = `hsl(${Math.random()*360},90%,55%)`;
      b.style.animationDuration = (8 + Math.random()*6) + 's';
      document.body.appendChild(b);
      setTimeout(()=> { b.remove(); }, 15000);
    }
    balloonInterval = setInterval(createBalloon, 1200);
    // create a couple immediately for effect
    createBalloon(); createBalloon();

    // flowers: limit & interval
    const flowerImages = [
      "flowers/flower1.png",
      "flowers/flower2.png",
      "flowers/flower3.png",
      "flowers/flower4.png",
      "flowers/flower5.png"
    ];
    function createFlower(){
      const maxFlowers = 25;
      if (document.querySelectorAll('.flower').length >= maxFlowers) return;
      const f = document.createElement('img');
      f.className = 'flower';
      f.src = flowerImages[Math.floor(Math.random()*flowerImages.length)] || '';
      f.style.left = (Math.random()*100) + 'vw';
      f.style.width = (30 + Math.random()*30) + 'px';
      f.style.animationDuration = (6 + Math.random()*6) + 's';
      document.body.appendChild(f);
      setTimeout(()=> { f.remove(); }, 12000);
    }
    flowerInterval = setInterval(createFlower, 1400);
    // splash a few
    createFlower(); createFlower(); createFlower();

    // fireworks: limit & interval
    function createFirework(){
      const maxFireworks = 12;
      if (document.querySelectorAll('.firework').length >= maxFireworks) return;
      const fw = document.createElement('div');
      fw.className = 'firework';
      fw.style.left = (Math.random()*100) + 'vw';
      fw.style.top = (10 + Math.random()*60) + 'vh';
      fw.style.background = `hsl(${Math.random()*360},100%,60%)`;
      document.body.appendChild(fw);
      setTimeout(()=> { fw.remove(); }, 1000);
    }
    fireworkInterval = setInterval(createFirework, 700);
    createFirework(); createFirework();
  }

  /* -------- initialization: decide which view to show -------- */
  if (new Date() < birthday) {
    showCountdown();
  } else {
    showCelebration();
  }

  /* Optional: if user closes tab and returns, ensure the page state remains correct */
  window.addEventListener('focus', () => {
    if (new Date() >= birthday && !document.querySelector('.quote-box')) {
      // if birthday time has now passed and celebration not rendered, show it
      if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
      showCelebration();
    }
  });

});
</script>
</body>
</html>
